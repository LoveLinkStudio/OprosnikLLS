    <style>
        :root {
            --pastel-pink: #f8d7da;
            --pastel-blue: #d1ecf1;
            --pastel-yellow: #fff3cd;
            --pastel-green: #d4edda;
            --soft-white: #fdfdfd;
            --text-primary: #2c3e50;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-blue) 50%, var(--pastel-yellow) 100%);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            animation: fadeInUp 1s ease-out;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #ff9a9e !important;
    	    background: none !important;
            -webkit-text-fill-color: #ff9a9e !important;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
        }

        .header h1::after {
            content: '💕';
            position: absolute;
            top: -10px;
            right: -20px;
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(50px);
        }

        .form-section:nth-child(odd) { animation-delay: 0.1s; }
        .form-section:nth-child(even) { animation-delay: 0.2s; }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid transparent;
            border-radius: 15px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff9a9e;
            background: white;
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .checkbox-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .checkbox-item:hover::before {
            opacity: 0.1;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin-right: 12px;
            transform: scale(1.3);
            accent-color: #ff9a9e;
        }

        .checkbox-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            margin-top: 30px;
        }
	.admin-panel { display: none; position: fixed; top: 20px; right: 20px; z-index: 10000; }
	.admin-toggle { position: fixed; top: 20px; right: 20px; background: #ff6b6b; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 10001; font-size: 20px; }

	.download-btn { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; width: 100%; margin-top: 20px; font-size: 1.1rem; }
        .btn-submit:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 25px 50px rgba(255, 154, 158, 0.4);

        .footer p {
            font-size: 1.3rem;
            font-style: italic;
            margin-bottom: 20px;
        }

        .footer a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 25px;
            display: inline-block;
            transition: all 0.3s ease;

        .footer a:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-3px);
        }

        .success-message {
            display: none;
            background: var(--pastel-green);
            color: #155724;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            animation: bounceIn 0.6s ease-out;
        }

        /* Анимации */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .form-section { padding: 20px; margin: 15px 0; }
            .checkbox-group { grid-template-columns: 1fr; }
            .header h1 { font-size: 2.2rem; }
            input, textarea, select { padding: 12px 16px; font-size: 16px; }
        }

        @media (max-width: 480px) {
            .header { padding: 20px 0; }
            .form-section { padding: 15px; border-radius: 20px; }
            .btn-submit { padding: 18px 30px; font-size: 1.2rem; }
        }

        /* Плавная прокрутка */
        html { scroll-behavior: smooth; }

        /* Loading анимация */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

let adminLoggedIn = false;
const SECRET_PASSWORD = 'Igorek72rus@'; // ← ВАШ пароль здесь

function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function loginAdmin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === SECRET_PASSWORD) {
    adminLoggedIn = true;
    document.getElementById('adminContent').style.display = 'block';
    document.getElementById('adminPass').style.display = 'none';
    loadSurveys();
    alert('✅ Вход выполнен!');
  } else {
    alert('❌ Неверный пароль!');
  }
}

async function loadSurveys() {
  try {
    if (db) {
      const snapshot = await db.collection('weddingSurveys').get();
      document.getElementById('surveyCount').textContent = snapshot.size;
      document.getElementById('surveysList').innerHTML = snapshot.docs.map(doc => {
        const data = doc.data();
        return `<div style="border-bottom:1px solid #eee; padding:10px 0;">
          <strong>${data.coupleNames || 'Без имени'}</strong><br>
          <small>${data.weddingDate || ''} | ${data.venue || ''}</small>
        </div>`;
      }).join('');
    }
  } catch(e) {
    console.error('Ошибка загрузки:', e);
  }
}

function downloadXLS() {
  if (!adminLoggedIn) return alert('Требуется вход в админку!');
  
  db.collection('weddingSurveys').get().then(snapshot => {
    // Создаем HTML таблицу (Excel понимает идеально)
    let htmlContent = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Опросник свадьбы</title>
<style>
table { border-collapse: collapse; width: 100%; font-family: Arial; }
th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
th { background-color: #ff9a9e; color: white; font-weight: bold; }
tr:nth-child(even) { background-color: #f9f9f9; }
</style>
</head>
<body>
<table>
<tr>
<th>Дата</th><th>Имена</th><th>Место</th><th>Тайминг</th><th>Цвета</th>
<th>Доп.инфо</th><th>Дизайн</th><th>Медиа</th><th>История</th><th>Опции</th>
</tr>`;

    snapshot.docs.forEach(doc => {
      const d = doc.data();
      const clean = (text) => String(text || '').replace(/[<>&]/g, '').slice(0, 100);
      
      htmlContent += `
<tr>
<td>${clean(d.weddingDate)}</td>
<td>${clean(d.coupleNames)}</td>
<td>${clean(d.venue)}</td>
<td>${clean(d.timeline)}</td>
<td>${clean(d.dressCode)}</td>
<td>${clean(d.extraInfo)}</td>
<td>${clean(d.designStyle)}</td>
<td>${clean(d.mediaInfo)}</td>
<td>${clean(d.loveStory)}</td>
<td>${Array.isArray(d.options) ? d.options.join(', ') : clean(d.options)}</td>
</tr>`;
    });

    htmlContent += '</table></body></html>';

    const BOM = '\uFEFF';
    const blob = new Blob([BOM + htmlContent], { 
      type: 'application/vnd.ms-excel;charset=utf-8' 
    });
    
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'wedding_results.xls';
    a.click();
    URL.revokeObjectURL(url);
  });
}
